<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Calculadora de Gorjeta</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-label position="stacked">Valor da Conta (Kz)</ion-label>
    <ion-input type="number" [(ngModel)]="valorConta" placeholder="Ex: 5000"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Gorjeta (%)</ion-label>
    <ion-input type="number" [(ngModel)]="porcentagem" placeholder="10"></ion-input>
  </ion-item>

  <ion-button expand="block" (click)="calcular()" class="ion-margin-top">
    Calcular Total
  </ion-button>

  <ion-card *ngIf="total > 0" class="ion-margin-top">
    <ion-card-content>
      <p>Valor da Gorjeta: <strong>Kz {{ gorjeta }}</strong></p>
      <h2 style="color: green;">Total a Pagar: <strong>Kz {{ total }}</strong></h2>
    </ion-card-content>
  </ion-card>
</ion-content>
